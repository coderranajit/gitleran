<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganna suno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container1">
        <nav class="nav-bar">
            <ul>
                <li class="app-name"><img src="music-logo.png" alt="logo" class="logo">Ganna Sunno</li>
                <li class="info">Home</li>
                <li class="info">About</li>
            </ul>
        </nav>
        <main>
            <div class="container2">
                <h2> <u>Song List</u> </h2>
                <div>
                    <div class="songlist" id="songlist">
                        <!--Add list here-->
                    </div>
                </div>
                <img src="bgImage.avif" class="bgimg" alt="BGimg">
                <div class="songlist"> 
                </div>
                <i><img src="sound-equalizer.gif" alt="gif" id="gif"></i>
            </div>
        </main>
        <footer>
            <div class="footer">
                <input type="range" name="range" id="range" min="0" max="100" value="0">
                <div class="time-stamp">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
                <div class="play-work">
                    <i><img src="noShuffle1.png" alt="noShuffle" id="no-shuffle"></i>
                    <i><img src="backwardButton.svg" alt="prev" id="backwardButton"></i>
                    <i><img src="playButtonIcon1.png" alt="play" id="play"></i>
                    <i><img src="forwardButton.svg" alt="backwardButton" id="forwardButton"></i>
                    <i><img src="noRepeate1.png" alt="no-repeate" id="noRepeate"></i>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
